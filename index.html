<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
   <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <title>Chronovah</title>
    <style>
      /* ── Loader styles inlined so they apply before any bundle loads ── */
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        transition: opacity 0.35s ease;
      }
      .dark #app-loader { background-color: #0b1120; }
      #app-loader.hidden { opacity: 0; pointer-events: none; }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .loader-logo-wrap { perspective: 300px; }

      .loader-logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background-color: #3b82f6;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: loader-glow 2s ease-in-out infinite, loader-spin3d 2.4s ease-in-out infinite;
      }

      .loader-cube { width: 30px; height: 30px; color: #ffffff; display: block; }

      .loader-wordmark {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        font-size: 1.125rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #111827;
        opacity: 0;
        animation: loader-fade-in 0.5s ease 0.2s forwards;
      }
      .dark .loader-wordmark { color: #f1f5f9; }

      .loader-dots {
        display: flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
        animation: loader-fade-in 0.4s ease 0.4s forwards;
      }
      .loader-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background-color: #3b82f6;
        animation: loader-bounce 1.2s ease-in-out infinite;
      }
      .loader-dots span:nth-child(2) { animation-delay: 0.15s; }
      .loader-dots span:nth-child(3) { animation-delay: 0.3s; }

      @keyframes loader-glow {
        0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0), 0 4px 20px rgba(59,130,246,0.3); }
        50%       { box-shadow: 0 0 0 8px rgba(59,130,246,0.12), 0 4px 28px rgba(59,130,246,0.5); }
      }
      @keyframes loader-spin3d {
        0%   { transform: rotateY(0deg); }
        100% { transform: rotateY(360deg); }
      }
      @keyframes loader-fade-in { to { opacity: 1; } }
      @keyframes loader-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40%           { transform: translateY(-5px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <script>
      // Apply saved theme immediately before React renders
      (function () {
        const theme = localStorage.getItem('chronovah-theme') || 'ocean';
        if (theme !== 'ocean') {
          document.documentElement.classList.add('theme-' + theme);
        }
        // Apply dark mode immediately
        const dark = localStorage.getItem('chronovah-dark-mode');
        if (dark === 'true') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <!-- Initial app loader — removed once React mounts -->
    <div id="app-loader" aria-hidden="true">
      <div class="loader-content">
        <!-- Logo mark: cube SVG matching the Header's Box icon -->
        <div class="loader-logo-wrap">
          <div class="loader-logo">
            <svg class="loader-cube" width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Box / cube icon (matches lucide-react Box) -->
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="22.08" x2="12" y2="12"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          </div>
        </div>
        <!-- Wordmark -->
        <span class="loader-wordmark">Chronovah</span>
        <!-- Animated dots -->
        <div class="loader-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
